<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            width: 100%;
            height: 100%;
            position: relative;
            background: black;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Botão de ativação (apenas um botão simples) */
        .fullscreen-button {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #ff5500;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 60px;
            box-shadow: 0 0 20px rgba(255,85,0,0.8);
            cursor: pointer;
            z-index: 1000;
            animation: pulse 1.2s infinite;
            font-family: inherit;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            50% { transform: translateX(-50%) scale(1.05); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 0.9; }
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: #ccc;
            background: rgba(0,0,0,0.5);
            font-size: 12px;
            padding: 6px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="container">
    <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
</div>
<button class="fullscreen-button" id="fullscreenBtn">🔲 TELA CHEIA</button>
<div class="status" id="statusMsg">Toque no botão para ativar tela cheia e anúncios</div>

<script>
    // ==================== LISTA DE VÍDEOS ====================
    // Coloque seus vídeos .mp4 na mesma pasta e liste aqui
    const videoList = [
        "Pla.mp4",
        "teste1.mp4",
        "teste3.mp4"
    ];

    // Para teste com vídeos online (funciona em qualquer celular), descomente abaixo e comente acima
    /*
    const videoList = [
        "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
        "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4"
    ];
    */

    let currentVideo = 0;
    let wakeLock = null;
    let fullscreenActivated = false;
    const video = document.getElementById('adVideo');
    const btn = document.getElementById('fullscreenBtn');
    const statusDiv = document.getElementById('statusMsg');

    // Função para tocar o vídeo atual
    function playVideo() {
        if (!videoList.length) {
            statusDiv.innerText = "⚠️ Nenhum vídeo na lista!";
            return;
        }
        const src = videoList[currentVideo];
        video.src = src;
        video.load();
        video.play().then(() => {
            statusDiv.innerText = `▶️ Anúncio ${currentVideo+1}/${videoList.length}`;
        }).catch(e => {
            statusDiv.innerText = `❌ Erro no vídeo ${currentVideo+1}, pulando...`;
            setTimeout(() => {
                currentVideo = (currentVideo + 1) % videoList.length;
                playVideo();
            }, 2000);
        });
    }

    // Avança para o próximo vídeo quando terminar
    video.addEventListener('ended', () => {
        currentVideo = (currentVideo + 1) % videoList.length;
        playVideo();
    });

    // Em caso de erro de carregamento
    video.addEventListener('error', () => {
        statusDiv.innerText = "⚠️ Vídeo com erro, pulando...";
        setTimeout(() => {
            currentVideo = (currentVideo + 1) % videoList.length;
            playVideo();
        }, 1500);
    });

    // ========== ATIVAÇÃO DA TELA CHEIA E INÍCIO ==========
    async function enableFullscreenAndStart() {
        if (fullscreenActivated) return;
        
        // 1. Solicitar tela cheia (em vários formatos)
        const doc = document.documentElement;
        const requestFull = doc.requestFullscreen || doc.webkitRequestFullscreen || doc.msRequestFullscreen;
        if (requestFull) {
            try {
                await requestFull.call(doc);
                fullscreenActivated = true;
                statusDiv.innerText = "✅ Tela cheia ativada! Iniciando anúncios...";
            } catch (err) {
                statusDiv.innerText = "❌ Falha ao ativar tela cheia. Tente novamente.";
                console.error(err);
                return;
            }
        } else {
            statusDiv.innerText = "❌ Navegador não suporta tela cheia.";
            return;
        }

        // 2. Ativar Wake Lock (tela sempre ligada)
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.addEventListener('visibilitychange', async () => {
                    if (document.visibilityState === 'visible' && wakeLock === null) {
                        wakeLock = await navigator.wakeLock.request('screen');
                    }
                });
            } catch(e) {}
        }

        // 3. Esconder o botão
        btn.classList.add('hidden');

        // 4. Iniciar os vídeos
        playVideo();
    }

    // Evento de clique no botão
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        enableFullscreenAndStart();
    });
</script>
</body>
</html>
