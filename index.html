<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: fixed;
        }
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
        }
        .fullscreen-btn:active {
            transform: scale(0.9);
            background: #e63946;
            color: black;
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        /* Esconde o botão por padrão no mobile */
        .fullscreen-btn.hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
    </div>
    <div class="fullscreen-btn" id="fullscreenBtn">
        🔲
    </div>
    <div class="status" id="statusMsg">📺 Entrando em tela cheia...</div>

    <script>
        // ========== LISTA DE VÍDEOS (SUBSTITUA PELOS SEUS) ==========
        const videos = [
            "tete1.mp4",
            "tete1.mp4",
            "Pla.mp4"
        ];

        let current = 0;
        let wakeLock = null;
        let fullscreenAttempts = 0;
        const video = document.getElementById('adVideo');
        const btn = document.getElementById('fullscreenBtn');
        const statusDiv = document.getElementById('statusMsg');

        // Função para ativar tela cheia
        function activateFullscreen() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.webkitRequestFullscreen) { // Safari
                docEl.webkitRequestFullscreen();
            } else if (docEl.msRequestFullscreen) { // IE/Edge
                docEl.msRequestFullscreen();
            }
        }

        // Função para ativar wake lock
        async function activateWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusDiv.innerText = "✅ Tela cheia ativada | Wake Lock ativo";
                    
                    document.addEventListener('visibilitychange', async () => {
                        if (document.visibilityState === 'visible' && wakeLock === null) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } catch (e) {
                    console.log("Wake Lock não suportado:", e);
                    statusDiv.innerText = "✅ Tela cheia ativada";
                }
            } else {
                statusDiv.innerText = "✅ Tela cheia ativada";
            }
        }

        // Função para tocar o vídeo atual
        function playVideo() {
            if (!videos.length) return;
            video.src = videos[current];
            video.load();
            video.play().then(() => {
                statusDiv.innerText = `▶️ Anúncio ${current+1}/${videos.length}`;
            }).catch(e => {
                statusDiv.innerText = `⚠️ Erro no vídeo ${current+1}, tentando novamente...`;
                setTimeout(() => {
                    video.play().catch(() => {
                        current = (current + 1) % videos.length;
                        playVideo();
                    });
                }, 1000);
            });
        }

        // Avança para o próximo vídeo ao terminar
        video.addEventListener('ended', () => {
            current = (current + 1) % videos.length;
            playVideo();
        });

        // Se houver erro de carregamento
        video.addEventListener('error', () => {
            statusDiv.innerText = "❌ Vídeo com erro, pulando...";
            setTimeout(() => {
                current = (current + 1) % videos.length;
                playVideo();
            }, 1500);
        });

        // Evento de clique no botão (fallback)
        btn.addEventListener('click', () => {
            activateFullscreen();
            btn.classList.add('hide');
            activateWakeLock();
            if (video.paused) playVideo();
        });

        // Monitora quando sair da tela cheia
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                btn.classList.remove('hide');
                statusDiv.innerText = "🔓 Toque no botão para reativar tela cheia";
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) {
                btn.classList.remove('hide');
                statusDiv.innerText = "🔓 Toque no botão para reativar tela cheia";
            }
        });

        // ========== AUTOMATISMO PARA TELA CHEIA NO CARREGAMENTO ==========
        
        // Tenta ativar tela cheia automaticamente
        async function autoFullscreen() {
            // Pequeno delay para garantir que o DOM está pronto
            await new Promise(resolve => setTimeout(resolve, 500));
            
            try {
                activateFullscreen();
                fullscreenAttempts++;
                
                // Aguarda um pouco para ver se entrou em tela cheia
                setTimeout(async () => {
                    const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
                    
                    if (!isFullscreen && fullscreenAttempts < 3) {
                        // Se não entrou em tela cheia, tenta novamente
                        statusDiv.innerText = `🔄 Tentando tela cheia (${fullscreenAttempts}/3)...`;
                        autoFullscreen();
                    } else if (isFullscreen) {
                        // Conseguiu entrar em tela cheia
                        btn.classList.add('hide');
                        await activateWakeLock();
                        
                        // Força o vídeo a tocar com áudio desbloqueado em alguns navegadores
                        video.muted = false;
                        video.play().catch(() => {
                            // Se não conseguir com áudio, tenta sem áudio
                            video.muted = true;
                            video.play();
                        });
                        
                        playVideo();
                    } else if (fullscreenAttempts >= 3) {
                        // Se falhou após 3 tentativas, mostra o botão
                        statusDiv.innerText = "📱 Toque no botão para tela cheia";
                        btn.classList.remove('hide');
                        playVideo();
                    }
                }, 1000);
            } catch (e) {
                console.log("Erro ao entrar em tela cheia:", e);
                if (fullscreenAttempts < 3) {
                    autoFullscreen();
                } else {
                    statusDiv.innerText = "📱 Toque no botão para tela cheia";
                    btn.classList.remove('hide');
                    playVideo();
                }
            }
        }

        // Detecta se é dispositivo móvel
        function isMobile() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // Inicia o processo
        if (isMobile()) {
            // No mobile, tenta ativar tela cheia automaticamente
            // Nota: Muitos navegadores mobile exigem interação do usuário para fullscreen
            // Mas vamos tentar de qualquer forma
            autoFullscreen();
            
            // Fallback: Se o usuário tocar em qualquer lugar, ativa tela cheia
            document.body.addEventListener('touchstart', function onFirstTouch() {
                if (!(document.fullscreenElement || document.webkitFullscreenElement)) {
                    activateFullscreen();
                    btn.classList.add('hide');
                    activateWakeLock();
                    if (video.paused) playVideo();
                }
                document.body.removeEventListener('touchstart', onFirstTouch);
            }, { once: true });
        } else {
            // Desktop: tenta ativar automaticamente
            autoFullscreen();
        }

        // Pré-carrega o primeiro vídeo
        if (videos.length) {
            video.src = videos[0];
            video.load();
        }
        
        // Força o vídeo a tocar mesmo em background em alguns navegadores
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && video.paused && videos.length) {
                video.play().catch(e => console.log("Auto-play bloqueado"));
            }
        });
    </script>
</body>
</html>
