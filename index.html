<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Força proporção 9:16 (1080x1920) */
            max-width: 1080px;
            max-height: 1920px;
            margin: 0 auto;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ou 'cover' para preencher totalmente */
        }

        /* Botão para sair do modo tela cheia (opcional, some após 3s) */
        .exit-fullscreen {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.5s;
            pointer-events: auto;
            font-family: monospace;
        }

        .exit-fullscreen.hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
    </div>
    <button class="exit-fullscreen" id="exitFullscreenBtn">✕ Sair da tela cheia</button>

    <script>
        // ============================================================
        // LISTA DE VÍDEOS DE ANÚNCIO (SEM ÁUDIO)
        // Substitua pelos seus vídeos (arquivos locais ou URLs)
        // ============================================================
        const videoList = [
            "anu.mp4",          // primeiro vídeo
            "outro_anuncio.mp4", // segundo vídeo
            "mais_um.mp4"       // terceiro, etc.
        ];

        // Se preferir usar URLs online (exemplo):
        // const videoList = [
        //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
        //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4"
        // ];

        let currentIndex = 0;
        const videoElem = document.getElementById('adVideo');
        const exitBtn = document.getElementById('exitFullscreenBtn');

        // Carrega o próximo vídeo da lista
        function loadNextVideo() {
            if (videoList.length === 0) return;
            const src = videoList[currentIndex];
            videoElem.src = src;
            videoElem.load();
            videoElem.play().catch(e => console.log("Autoplay pode precisar de toque inicial"));
        }

        // Quando um vídeo termina, vai para o próximo (loop infinito)
        videoElem.addEventListener('ended', () => {
            currentIndex = (currentIndex + 1) % videoList.length;
            loadNextVideo();
        });

        // Se der erro no vídeo (ex: arquivo não encontrado), pula para o próximo
        videoElem.addEventListener('error', () => {
            console.warn("Erro no vídeo, pulando para o próximo");
            currentIndex = (currentIndex + 1) % videoList.length;
            loadNextVideo();
        });

        // Inicia com o primeiro vídeo
        if (videoList.length > 0) {
            loadNextVideo();
        }

        // ============================================================
        // TELA CHEIA AUTOMÁTICA (com toque obrigatório para ativar)
        // ============================================================
        function enterFullscreen() {
            const docEl = document.documentElement;
            const requestMethod = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            if (requestMethod) {
                requestMethod.call(docEl).catch(err => {
                    console.warn("Falha ao entrar em tela cheia:", err);
                });
            }
        }

        // Tenta entrar em tela cheia após qualquer toque na tela
        document.body.addEventListener('touchstart', function onFirstTouch() {
            enterFullscreen();
            document.body.removeEventListener('touchstart', onFirstTouch);
        }, { once: true });

        // Mostra um botão para sair da tela cheia (opcional)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                // Saiu da tela cheia, mostra botão para reativar?
                exitBtn.classList.remove('hide');
                setTimeout(() => exitBtn.classList.add('hide'), 3000);
            } else {
                exitBtn.classList.add('hide');
            }
        });

        // Botão para sair da tela cheia manualmente
        exitBtn.addEventListener('click', () => {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        });

        // Oculta o botão após 3 segundos
        setTimeout(() => exitBtn.classList.add('hide'), 3000);

        // ============================================================
        // WAKE LOCK - Mantém a tela ligada enquanto a página estiver ativa
        // ============================================================
        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("Wake Lock ativado - tela não vai apagar");
                    // Recupera o wake lock se a página ficar visível novamente
                    document.addEventListener('visibilitychange', async () => {
                        if (document.visibilityState === 'visible' && wakeLock === null) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } catch (err) {
                    console.error("Wake Lock error:", err);
                }
            }
        }
        requestWakeLock();

        // ============================================================
        // GARANTE QUE O VÍDEO CONTINUE TOCANDO MESMO APÓS VOLTAR DE OUTRA ABA
        // ============================================================
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                if (videoElem.paused) {
                    videoElem.play().catch(e => console.log("retomada falhou"));
                }
                if (wakeLock === null) requestWakeLock();
            }
        });

        // Impede que toque no vídeo pause
        videoElem.addEventListener('click', (e) => {
            e.preventDefault();
            videoElem.play().catch(e => {});
        });
    </script>
</body>
</html>
