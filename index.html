<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* proporção 9:16 (1080x1920) */
            max-width: 1080px;
            max-height: 1920px;
            margin: 0 auto;
            position: relative;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ou 'cover' se quiser sem bordas */
        }

        /* Botão de ativação (tela cheia) */
        .activate-btn {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        .activate-btn button {
            background: linear-gradient(135deg, #ff6600, #ff3300);
            border: none;
            color: white;
            font-size: 28px;
            font-weight: bold;
            padding: 18px 36px;
            border-radius: 60px;
            box-shadow: 0 0 30px rgba(255,102,0,0.8);
            cursor: pointer;
            animation: pulse 1.5s infinite;
            font-family: system-ui, sans-serif;
        }

        .activate-btn p {
            position: absolute;
            bottom: 20%;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 16px;
            font-family: system-ui;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* Mensagem de status (pequena) */
        .status {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            padding: 4px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="adVideo" muted playsinline disablePictureInPicture></video>
</div>

<div class="activate-btn" id="activateBtn">
    <button>🔲 ATIVAR TELA CHEIA</button>
    <p>Toque no botão para iniciar os anúncios</p>
</div>

<div class="status" id="statusMsg">⚡ Aguardando ativação</div>

<script>
    // ==============================================
    // LISTA DE VÍDEOS DE ANÚNCIO (SEM ÁUDIO)
    // Coloque seus arquivos .mp4 na mesma pasta
    // ==============================================
    const videos = [
        "anu.mp4",               // <--- substitua pelos seus vídeos
        "outro_anuncio.mp4",
        "mais_um.mp4"
    ];

    // Se quiser testar com vídeos online, descomente a linha abaixo e comente a de cima:
    // const videos = [
    //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
    //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4"
    // ];

    let currentIndex = 0;
    let wakeLock = null;
    let isFullscreen = false;

    const videoElem = document.getElementById('adVideo');
    const activateDiv = document.getElementById('activateBtn');
    const statusSpan = document.getElementById('statusMsg');

    // Função para tocar o vídeo atual
    function playCurrentVideo() {
        if (!videos.length) {
            statusSpan.innerText = "❌ Nenhum vídeo na lista!";
            return;
        }
        const src = videos[currentIndex];
        videoElem.src = src;
        videoElem.load();
        videoElem.play().then(() => {
            statusSpan.innerText = `▶️ Anúncio ${currentIndex+1}/${videos.length}`;
        }).catch(err => {
            console.warn("Erro ao tocar vídeo:", err);
            statusSpan.innerText = `⚠️ Erro no vídeo ${currentIndex+1}, pulando...`;
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % videos.length;
                playCurrentVideo();
            }, 2000);
        });
    }

    // Quando o vídeo termina, passa para o próximo
    videoElem.addEventListener('ended', () => {
        currentIndex = (currentIndex + 1) % videos.length;
        playCurrentVideo();
    });

    // Em caso de erro (arquivo não encontrado)
    videoElem.addEventListener('error', () => {
        statusSpan.innerText = "⚠️ Vídeo com erro, pulando...";
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % videos.length;
            playCurrentVideo();
        }, 1500);
    });

    // ========== ATIVAR TELA CHEIA E WAKE LOCK ==========
    async function activateFullscreenAndPlay() {
        if (isFullscreen) return;

        // 1. Entrar em tela cheia
        const docEl = document.documentElement;
        const requestFull = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
        if (requestFull) {
            try {
                await requestFull.call(docEl);
                isFullscreen = true;
                statusSpan.innerText = "✅ Tela cheia ativada";
            } catch(e) {
                statusSpan.innerText = "❌ Falha ao entrar em tela cheia. Toque novamente.";
                console.error(e);
                return;
            }
        }

        // 2. Ativar Wake Lock (tela sempre ligada)
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                // Recupera wake lock se a página ficar visível novamente
                document.addEventListener('visibilitychange', async () => {
                    if (document.visibilityState === 'visible' && wakeLock === null) {
                        wakeLock = await navigator.wakeLock.request('screen');
                    }
                });
                statusSpan.innerText = "✅ Tela sempre ligada ativada";
            } catch(e) {
                console.warn("Wake Lock não suportado/permitido");
            }
        }

        // 3. Remover o botão de ativação
        activateDiv.style.display = 'none';

        // 4. Iniciar os vídeos
        playCurrentVideo();
    }

    // Evento de clique no botão e no fundo escuro
    const btn = document.querySelector('#activateBtn button');
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        activateFullscreenAndPlay();
    });
    activateDiv.addEventListener('click', (e) => {
        if (e.target === activateDiv) activateFullscreenAndPlay();
    });

    // Instrução inicial
    statusSpan.innerText = "📱 Toque no botão laranja para iniciar";
</script>
</body>
</html>
