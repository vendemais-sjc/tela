<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso • Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Proporção 9:16 (1080x1920) */
            max-width: 1080px;
            max-height: 1920px;
            margin: 0 auto;
        }

        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .instruction {
            position: fixed;
            bottom: 25%;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 20;
            transition: opacity 1s ease;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
        }

        .instruction.hide {
            opacity: 0;
            visibility: hidden;
        }

        .exit-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: #ccc;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
    </div>
    <div class="instruction" id="instruction">👆 Toque em qualquer lugar para ATIVAR TELA CHEIA</div>
    <div class="exit-hint">🔒 Tela sempre ligada | Toque para sair da tela cheia</div>

    <script>
        // ============================================================
        // LISTA DE VÍDEOS (coloque seus arquivos .mp4 na mesma pasta)
        // ============================================================
        const videoList = [
            "pri.mp4",
            "teste2.mp4",
            "teste4.mp4"
        ];

        // Se não tiver vídeos, use este exemplo online (comente a linha acima e descomente abaixo)
        // const videoList = [
        //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
        //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4"
        // ];

        let currentVideoIndex = 0;
        let usingFallback = false;
        let fallbackInterval = null;
        let wakeLock = null;
        let fullscreenActivated = false;

        const videoElem = document.getElementById('adVideo');
        const instructionDiv = document.getElementById('instruction');

        // ==================== FALLBACK (CANVAS ANIMADO) ====================
        function startFallback() {
            if (usingFallback) return;
            usingFallback = true;
            videoElem.style.display = 'none';
            
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1920;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.objectFit = 'contain';
            document.querySelector('.video-container').appendChild(canvas);
            const ctx = canvas.getContext('2d');
            
            const ads = [
                "🔥 SUPER OFERTA",
                "📢 ANÚNCIO DESTAQUE",
                "🎁 PROMOÇÃO ESPECIAL",
                "⚡ APROVEITE AGORA",
                "⭐ PRODUTO TOP"
            ];
            let adIndex = 0;
            
            function drawFallback() {
                // Gradiente de fundo
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#0a0a1a');
                grad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Logo / título
                ctx.fillStyle = '#e63946';
                ctx.font = `bold ${canvas.width * 0.08}px 'Segoe UI'`;
                ctx.textAlign = 'center';
                ctx.fillText("TELA DE DESCANSO", canvas.width/2, canvas.height * 0.3);
                
                // Mensagem do anúncio
                ctx.fillStyle = '#ffffff';
                ctx.font = `${canvas.width * 0.06}px 'Segoe UI'`;
                ctx.fillText(ads[adIndex], canvas.width/2, canvas.height * 0.55);
                
                // Indicador de rodízio
                ctx.font = `${canvas.width * 0.035}px monospace`;
                ctx.fillStyle = '#aaaaaa';
                ctx.fillText(`Anúncio ${currentVideoIndex+1} • Toque para controles`, canvas.width/2, canvas.height * 0.85);
                
                // Pontos animados
                const dots = '.'.repeat(Math.floor(Date.now() / 800) % 4);
                ctx.fillStyle = '#ffaa44';
                ctx.fillText(`exibindo ${dots}`, canvas.width/2, canvas.height * 0.92);
            }
            
            function rotateAd() {
                adIndex = (adIndex + 1) % ads.length;
                drawFallback();
            }
            
            drawFallback();
            fallbackInterval = setInterval(rotateAd, 4500);
        }

        // ==================== VÍDEOS REAIS ====================
        function loadVideo() {
            if (usingFallback) return;
            if (!videoList.length) {
                startFallback();
                return;
            }
            const src = videoList[currentVideoIndex];
            videoElem.src = src;
            videoElem.load();
            videoElem.play().catch(err => {
                console.warn("Erro ao reproduzir vídeo:", err);
                startFallback();
            });
        }

        videoElem.addEventListener('ended', () => {
            if (usingFallback) return;
            currentVideoIndex = (currentVideoIndex + 1) % videoList.length;
            loadVideo();
        });

        videoElem.addEventListener('error', () => {
            if (usingFallback) return;
            console.warn("Erro no vídeo, pulando para o próximo");
            currentVideoIndex = (currentVideoIndex + 1) % videoList.length;
            loadVideo();
        });

        // ==================== TELA CHEIA + WAKE LOCK (no primeiro toque) ====================
        async function activateFullscreenAndWakeLock() {
            if (fullscreenActivated) return;
            fullscreenActivated = true;
            
            // 1. Tela cheia
            const docEl = document.documentElement;
            const requestFull = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
            if (requestFull) {
                try {
                    await requestFull.call(docEl);
                    instructionDiv.classList.add('hide');
                } catch(e) {
                    console.warn("Falha na tela cheia:", e);
                }
            }
            
            // 2. Wake Lock (tela sempre ligada)
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    // Recupera wake lock ao voltar para a aba
                    document.addEventListener('visibilitychange', async () => {
                        if (document.visibilityState === 'visible' && wakeLock === null) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } catch(e) {
                    console.warn("Wake Lock não suportado/permitido");
                }
            }
            
            // 3. Tenta iniciar a reprodução do vídeo (caso esteja pausado)
            if (!usingFallback && videoElem.paused) {
                videoElem.play().catch(e => console.log("autoplay após fullscreen"));
            }
        }

        // Aguarda o primeiro toque/clique do usuário
        document.addEventListener('touchstart', activateFullscreenAndWakeLock, { once: true });
        document.addEventListener('click', activateFullscreenAndWakeLock, { once: true });
        
        // ==================== INICIALIZAÇÃO ====================
        // Testa se o primeiro vídeo da lista é acessível
        if (videoList.length > 0) {
            const testVideo = document.createElement('video');
            testVideo.src = videoList[0];
            testVideo.onloadeddata = () => {
                // Vídeo ok, usa o sistema normal
                usingFallback = false;
                if (fallbackInterval) clearInterval(fallbackInterval);
                videoElem.style.display = 'block';
                loadVideo();
            };
            testVideo.onerror = () => {
                // Falha no primeiro vídeo, vai para fallback
                startFallback();
            };
            setTimeout(() => {
                if (!usingFallback && videoElem.paused && !videoElem.src) {
                    startFallback();
                }
            }, 1500);
        } else {
            startFallback();
        }
        
        // Instrução inicial (já visível)
        instructionDiv.classList.remove('hide');
        
        // Se o navegador permitir autoplay sem toque, já tenta (mas não esperamos)
        if (videoList.length) {
            videoElem.play().catch(e => {});
        }
        
        // Botão de saída da tela cheia (opcional, mas útil)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                // Sair da tela cheia: reativa a instrução para o próximo toque
                fullscreenActivated = false;
                instructionDiv.classList.remove('hide');
                document.addEventListener('touchstart', activateFullscreenAndWakeLock, { once: true });
                document.addEventListener('click', activateFullscreenAndWakeLock, { once: true });
            }
        });
    </script>
</body>
</html>
