<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .video-container {
            width: 100%;
            height: 100%;
            background: black;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Botão flutuante igual ao do seu menu */
        .fullscreen-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .fullscreen-btn:active {
            transform: scale(0.95);
            background: #e63946;
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div class="video-container">
    <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
</div>
<button class="fullscreen-btn" id="fullscreenBtn">
    <i class="fas fa-expand"></i> TELA CHEIA
</button>
<div class="status" id="statusMsg">📺 Toque no botão para tela cheia</div>

<script>
    // ==================== VÍDEOS (SUBSTITUA) ====================
    const videos = [
        "pri.mp4",
        "teste3.mp4"
    ];

    // Teste com vídeos online (funciona em qualquer lugar)
    // const videos = [
    //     "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
    // ];

    let current = 0;
    let wakeLock = null;
    const video = document.getElementById('adVideo');
    const btn = document.getElementById('fullscreenBtn');
    const statusDiv = document.getElementById('statusMsg');

    // Tocar vídeo atual
    function playVideo() {
        if (!videos.length) return;
        video.src = videos[current];
        video.load();
        video.play().then(() => {
            statusDiv.innerText = `▶️ Anúncio ${current+1}/${videos.length}`;
        }).catch(e => {
            statusDiv.innerText = `⚠️ Erro no vídeo ${current+1}, pulando...`;
            setTimeout(() => {
                current = (current + 1) % videos.length;
                playVideo();
            }, 2000);
        });
    }

    video.addEventListener('ended', () => {
        current = (current + 1) % videos.length;
        playVideo();
    });
    video.addEventListener('error', () => {
        statusDiv.innerText = "❌ Erro, pulando...";
        setTimeout(() => {
            current = (current + 1) % videos.length;
            playVideo();
        }, 1500);
    });

    // ==================== TELA CHEIA (MESMO DO SEU PROJETO) ====================
    btn.addEventListener('click', () => {
        // Entrar em tela cheia exatamente como no Cazé Playlist
        document.documentElement.requestFullscreen();
        // Esconder botão após ativar (opcional)
        btn.style.display = 'none';
        // Ativar wake lock (tela sempre ligada)
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').then(lock => {
                wakeLock = lock;
                // Recuperar wake lock se a aba ficar visível
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible' && wakeLock === null) {
                        navigator.wakeLock.request('screen').then(l => wakeLock = l);
                    }
                });
            }).catch(e => console.log);
        }
        // Iniciar vídeo (se ainda não estiver tocando)
        if (video.paused) playVideo();
        statusDiv.innerText = "✅ Tela cheia ativada";
    });

    // Para sair da tela cheia (opcional, mas útil)
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            // Saiu da tela cheia, mostra botão novamente
            btn.style.display = 'flex';
            statusDiv.innerText = "🔓 Tela cheia desativada. Toque no botão para reativar.";
        }
    });

    // Carrega o primeiro vídeo (mas não toca até o botão)
    if (videos.length) {
        video.src = videos[0];
        video.load();
    }
</script>
</body>
</html>
