<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1080px;
            max-height: 1920px;
            margin: 0 auto;
            position: relative;
        }
        .video-container { width: 100%; height: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            color: #ffcc00;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            font-family: monospace;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .exit-fullscreen {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            z-index: 100;
            transition: opacity 0.5s;
            pointer-events: auto;
            font-family: monospace;
        }
        .exit-fullscreen.hide { opacity: 0; pointer-events: none; }
        .start-btn {
            position: fixed;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 300;
            box-shadow: 0 0 20px rgba(255,102,0,0.5);
            animation: pulse 1.5s infinite;
            white-space: nowrap;
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            50% { transform: translateX(-50%) scale(1.05); opacity: 1; }
            100% { transform: translateX(-50%) scale(1); opacity: 0.9; }
        }
        .start-btn.hide { display: none; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="adVideo" muted playsinline disablePictureInPicture></video>
    </div>
    <div class="message" id="statusMsg">🔧 Toque no botão para iniciar os anúncios</div>
    <button class="exit-fullscreen hide" id="exitFullscreenBtn">✕ Sair da tela cheia</button>
    <button class="start-btn" id="startBtn">🎬 INICIAR ANÚNCIOS</button>

    <script>
        // ============================================================
        // LISTA DE VÍDEOS (SUBSTITUA PELOS SEUS)
        // Se não tiver vídeos, o sistema usa um fallback animado (canvas)
        // ============================================================
        const videoList = [
            "anu.mp4",          // <-- coloque seus vídeos aqui
            "outro_anuncio.mp4",
            "mais_um.mp4"
        ];

        // Flag para saber se usamos fallback (quando não há vídeos válidos)
        let usingFallback = false;
        let fallbackInterval = null;
        let currentIndex = 0;
        const videoElem = document.getElementById('adVideo');
        const statusDiv = document.getElementById('statusMsg');
        const startBtn = document.getElementById('startBtn');
        const exitBtn = document.getElementById('exitFullscreenBtn');

        // ========== FALLBACK: CANVAS ANIMADO (caso não haja vídeos) ==========
        function startFallback() {
            usingFallback = true;
            videoElem.style.display = 'none';
            
            // Cria um canvas para exibir anúncio simulado
            const canvas = document.createElement('canvas');
            canvas.width = 1080;
            canvas.height = 1920;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.objectFit = 'contain';
            document.querySelector('.video-container').appendChild(canvas);
            const ctx = canvas.getContext('2d');
            
            const adMessages = [
                "📺 ANÚNCIO 1 - SUPER PROMOÇÃO",
                "🎉 OFERTA IMPERDÍVEL",
                "🚀 APROVEITE AGORA",
                "⭐ PRODUTO DESTAQUE",
                "💥 ÚLTIMOS DIAS"
            ];
            let msgIndex = 0;
            
            function drawFallbackAd() {
                // Fundo gradiente
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#1a1a2e');
                grad.addColorStop(1, '#16213e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Texto do anúncio
                ctx.fillStyle = '#e63946';
                ctx.font = `bold ${canvas.width * 0.08}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText("TELA DE DESCANSO", canvas.width/2, canvas.height * 0.3);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = `${canvas.width * 0.05}px Arial`;
                ctx.fillText(adMessages[msgIndex], canvas.width/2, canvas.height * 0.5);
                
                ctx.font = `${canvas.width * 0.04}px monospace`;
                ctx.fillStyle = '#aaa';
                ctx.fillText("Toque na tela para controles", canvas.width/2, canvas.height * 0.8);
                
                // Animação de "carregando"
                const time = Date.now() / 500;
                const dots = '.'.repeat(Math.floor(time) % 4);
                ctx.fillStyle = '#ffaa44';
                ctx.fillText(`Anúncio ${currentIndex+1} ${dots}`, canvas.width/2, canvas.height * 0.9);
            }
            
            function rotateFallbackMessage() {
                msgIndex = (msgIndex + 1) % adMessages.length;
                drawFallbackAd();
            }
            
            drawFallbackAd();
            fallbackInterval = setInterval(() => {
                if (usingFallback) {
                    rotateFallbackMessage();
                }
            }, 4000);
            
            statusDiv.innerHTML = "⚠️ Nenhum vídeo encontrado. Usando fallback animado. Adicione vídeos .mp4 na pasta.";
        }

        // ========== CARREGAR PRÓXIMO VÍDEO REAL ==========
        function loadNextVideo() {
            if (usingFallback) return;
            if (videoList.length === 0) {
                startFallback();
                return;
            }
            const src = videoList[currentIndex];
            videoElem.src = src;
            videoElem.load();
            videoElem.play().then(() => {
                statusDiv.innerHTML = `▶️ Reproduzindo: ${src.split('/').pop()}`;
                setTimeout(() => statusDiv.style.opacity = '0', 2000);
            }).catch(err => {
                console.warn("Erro ao tentar tocar vídeo:", err);
                statusDiv.innerHTML = `❌ Não foi possível tocar ${src}. Pulando...`;
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % videoList.length;
                    loadNextVideo();
                }, 2000);
            });
        }

        // Quando o vídeo termina, vai para o próximo
        videoElem.addEventListener('ended', () => {
            if (usingFallback) return;
            currentIndex = (currentIndex + 1) % videoList.length;
            loadNextVideo();
        });

        // Se der erro no vídeo, pula
        videoElem.addEventListener('error', () => {
            if (usingFallback) return;
            statusDiv.style.opacity = '1';
            statusDiv.innerHTML = "⚠️ Erro no vídeo, pulando...";
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % videoList.length;
                loadNextVideo();
            }, 1500);
        });

        // ========== INICIAR (CHAMADO PELO BOTÃO) ==========
        async function startAds() {
            // Oculta botão
            startBtn.classList.add('hide');
            
            // Ativar tela cheia
            const docEl = document.documentElement;
            const requestFull = docEl.requestFullscreen || docEl.webkitRequestFullscreen;
            if (requestFull) {
                try {
                    await requestFull.call(docEl);
                    exitBtn.classList.remove('hide');
                    setTimeout(() => exitBtn.classList.add('hide'), 3000);
                } catch(e) { console.warn("fullscreen falhou", e); }
            }
            
            // Ativar Wake Lock
            if ('wakeLock' in navigator) {
                try {
                    await navigator.wakeLock.request('screen');
                    statusDiv.innerHTML = "✅ Tela sempre ligada ativada";
                    setTimeout(() => statusDiv.style.opacity = '0', 2000);
                } catch(e) {}
            }
            
            // Verificar se há vídeos válidos (testa o primeiro)
            if (videoList.length > 0) {
                // Tenta carregar o primeiro vídeo
                const testVideo = document.createElement('video');
                testVideo.src = videoList[0];
                testVideo.onloadeddata = () => {
                    usingFallback = false;
                    if (fallbackInterval) clearInterval(fallbackInterval);
                    videoElem.style.display = 'block';
                    loadNextVideo();
                };
                testVideo.onerror = () => {
                    // Se o primeiro vídeo falhar, usa fallback
                    startFallback();
                };
                setTimeout(() => {
                    if (!usingFallback && videoElem.paused && !videoElem.src) {
                        startFallback();
                    }
                }, 1000);
            } else {
                startFallback();
            }
        }

        // Botão principal
        startBtn.addEventListener('click', startAds);
        
        // Botão para sair da tela cheia
        exitBtn.addEventListener('click', () => {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        });
        
        // Ao sair da tela cheia, mostra botão novamente
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                exitBtn.classList.remove('hide');
                setTimeout(() => exitBtn.classList.add('hide'), 3000);
                startBtn.classList.remove('hide');
                statusDiv.style.opacity = '1';
                statusDiv.innerHTML = "🔁 Modo janela. Toque novamente em INICIAR para tela cheia.";
            } else {
                exitBtn.classList.add('hide');
            }
        });
        
        // Instrução inicial
        statusDiv.style.opacity = '1';
    </script>
</body>
</html>
