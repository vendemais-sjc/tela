<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios (Tela Cheia)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container do vídeo ocupa toda a área disponível */
        .video-container {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ou 'cover' se quiser preencher sem bordas */
        }

        /* Botão/mensagem para ativar tela cheia (estilo grande e centralizado) */
        .fullscreen-btn {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            font-family: sans-serif;
            text-align: center;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: opacity 0.5s;
        }

        .fullscreen-btn button {
            background: #00aaff;
            border: none;
            color: white;
            font-size: 24px;
            padding: 16px 32px;
            border-radius: 60px;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,170,255,0.5);
            cursor: pointer;
        }

        .fullscreen-btn p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Mensagem de status (discreta) */
        #status {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
            z-index: 10;
            transition: opacity 0.8s;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="adVideo" muted playsinline disablePictureInPicture></video>
</div>
<div id="status">Inicializando...</div>

<!-- Overlay que pede toque para ativar tela cheia -->
<div id="fullscreenOverlay" class="fullscreen-btn">
    <p>📱 Toque para ativar<br><strong>TELA CHEIA</strong></p>
    <button id="enterFullscreenBtn">🔲 ATIVAR</button>
</div>

<script>
    (function() {
        // ================== LISTA DE VÍDEOS ==================
        // Substitua pelos seus vídeos (sem áudio de preferência)
        const videoList = [
          "pri.mp4",
            "teste1.mp4",
            "teste2.mp4",
            "Pla.mp4"  
        ];

        let currentIndex = 0;
        const videoElem = document.getElementById('adVideo');
        const statusDiv = document.getElementById('status');
        const overlay = document.getElementById('fullscreenOverlay');
        const enterBtn = document.getElementById('enterFullscreenBtn');

        // Função para carregar o vídeo atual
        function loadNextVideo() {
            if (!videoList.length) {
                statusDiv.innerText = "Nenhum anúncio";
                return;
            }
            const src = videoList[currentIndex];
            videoElem.src = src;
            videoElem.load();
            statusDiv.innerText = `Anúncio ${currentIndex+1}/${videoList.length}`;
            setTimeout(() => {
                if (statusDiv.style.opacity !== '0') statusDiv.style.opacity = '0';
            }, 2000);
        }

        // Alterna para o próximo vídeo ao terminar
        videoElem.addEventListener('ended', () => {
            currentIndex = (currentIndex + 1) % videoList.length;
            loadNextVideo();
            videoElem.play().catch(e => console.warn("autoplay:", e));
        });

        videoElem.addEventListener('canplaythrough', () => {
            // Só tenta tocar se já estiver em tela cheia (evita conflito)
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                videoElem.play().catch(e => console.log("play:", e));
            }
        });

        videoElem.addEventListener('error', () => {
            statusDiv.style.opacity = '1';
            statusDiv.innerText = "Erro, pulando...";
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % videoList.length;
                loadNextVideo();
                videoElem.play().catch(e=>{});
            }, 1000);
        });

        // ================== TELA CHEIA OBRIGATÓRIA COM TOQUE ==================
        function enterFullscreen() {
            const docEl = document.documentElement;
            const requestMethod = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
            if (requestMethod) {
                requestMethod.call(docEl).then(() => {
                    // Remove overlay após entrar em tela cheia
                    overlay.style.opacity = '0';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        // Inicia o vídeo automaticamente após tela cheia
                        videoElem.play().catch(e => console.log("play after fullscreen:", e));
                        // Ativa wake lock
                        requestWakeLock();
                    }, 500);
                }).catch(err => {
                    console.error("Falha tela cheia:", err);
                    alert("Toque no botão novamente para ativar tela cheia.");
                });
            } else {
                alert("Seu navegador não suporta tela cheia.");
            }
        }

        // Evento de toque no botão ou no overlay inteiro
        enterBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            enterFullscreen();
        });
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) enterFullscreen();
        });

        // ================== WAKE LOCK (mantém tela ligada) ==================
        let wakeLock = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusDiv.innerText = "✅ Tela sempre ligada";
                    setTimeout(() => { if (statusDiv.style.opacity !== '0') statusDiv.style.opacity = '0'; }, 2000);
                    document.addEventListener('visibilitychange', async () => {
                        if (document.visibilityState === 'visible' && wakeLock === null) {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } catch (err) {
                    console.error("Wake Lock error:", err);
                }
            }
        }

        // Se sair da tela cheia, tentar reativar (opcional)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                // Mostra overlay novamente se saiu da tela cheia
                if (overlay.style.display === 'none') {
                    overlay.style.display = 'flex';
                    overlay.style.opacity = '1';
                }
            } else {
                // Em tela cheia, garante que o vídeo toque
                if (videoElem.paused) videoElem.play().catch(e=>{});
            }
        });

        // Carrega o primeiro vídeo (não toca ainda, só depois da tela cheia)
        loadNextVideo();

        // Pré-carrega o primeiro vídeo (não toca até fullscreen)
        videoElem.load();

        // Impede que o vídeo seja pausado com toque
        videoElem.addEventListener('click', (e) => {
            e.preventDefault();
            videoElem.play().catch(e=>{});
        });
    })();
</script>
</body>
</html>
