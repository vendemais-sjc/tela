<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
        }
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* ou 'cover' se quiser preencher */
        }
        /* Botão igual ao do menu do Cazé Playlist */
        .fullscreen-btn {
            position: fixed;
            bottom: 30px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 31;
            transition: 0.2s;
        }
        .fullscreen-btn:active {
            transform: scale(0.9);
            background: #e63946;
        }
        /* Status opcional (pequeno) */
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            color: #ccc;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
    </div>
    <div class="fullscreen-btn" id="fullscreenBtn">
        <i class="fas fa-expand"></i>
    </div>
    <div class="status" id="statusMsg">📺 Toque no botão para tela cheia</div>

    <!-- Font Awesome (mesmo do Cazé Playlist) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        // ==================== LISTA DE VÍDEOS ====================
        // Coloque seus vídeos na mesma pasta (ex: "anu.mp4", "outro.mp4")
        const videos = [
            "teste1",
            "Pla.mp4",
            "teste2.mp4",
            
        ];

        // Se quiser testar com vídeo online (funciona em qualquer lugar), descomente a linha abaixo:
        // const videos = ["https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"];

        let currentIndex = 0;
        let wakeLock = null;
        const video = document.getElementById('adVideo');
        const btn = document.getElementById('fullscreenBtn');
        const statusDiv = document.getElementById('statusMsg');

        // ========== TOCAR VÍDEO ATUAL ==========
        function playCurrentVideo() {
            if (!videos.length) return;
            video.src = videos[currentIndex];
            video.load();
            video.play().then(() => {
                statusDiv.innerText = `▶️ Anúncio ${currentIndex+1}/${videos.length}`;
            }).catch(err => {
                statusDiv.innerText = `⚠️ Erro, pulando...`;
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % videos.length;
                    playCurrentVideo();
                }, 2000);
            });
        }

        video.addEventListener('ended', () => {
            currentIndex = (currentIndex + 1) % videos.length;
            playCurrentVideo();
        });

        video.addEventListener('error', () => {
            statusDiv.innerText = "❌ Erro no vídeo, pulando...";
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % videos.length;
                playCurrentVideo();
            }, 1500);
        });

        // ========== TELA CHEIA (MESMO DO CAZÉ PLAYLIST) ==========
        btn.addEventListener('click', () => {
            // Entrar em tela cheia (igual ao seu projeto)
            document.documentElement.requestFullscreen();
            // Esconder botão após ativar
            btn.style.display = 'none';
            // Ativar Wake Lock (tela sempre ligada)
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => {
                    wakeLock = lock;
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible' && wakeLock === null) {
                            navigator.wakeLock.request('screen').then(l => wakeLock = l);
                        }
                    });
                }).catch(e => console.log);
            }
            // Iniciar vídeo (se não estiver tocando)
            if (video.paused) playCurrentVideo();
            statusDiv.innerText = "✅ Tela cheia ativada";
        });

        // Se sair da tela cheia, mostra o botão novamente
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                btn.style.display = 'flex';
                statusDiv.innerText = "🔓 Toque no botão para reativar tela cheia";
            }
        });

        // Pré-carrega o primeiro vídeo (não toca até o botão)
        if (videos.length) {
            video.src = videos[0];
            video.load();
        }
    </script>
</body>
</html>
