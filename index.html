<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tela de Descanso - Anúncios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            position: fixed;
        }
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        /* Botão igual ao do menu do Cazé Playlist (mas estilizado como botão) */
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            transition: 0.2s;
        }
        .fullscreen-btn:active {
            transform: scale(0.9);
            background: #e63946;
            color: black;
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 20px;
            color: #ccc;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="adVideo" autoplay muted playsinline disablePictureInPicture></video>
    </div>
    <div class="fullscreen-btn" id="fullscreenBtn">
        🔲
    </div>
    <div class="status" id="statusMsg">📺 Toque no botão para tela cheia</div>

    <script>
        // ========== LISTA DE VÍDEOS (SUBSTITUA PELOS SEUS) ==========
        const videos = [
            "tete1.mp4",
            "tete1.mp4",
            "Pla.mp4"
        ];

        // PARA TESTAR COM VÍDEO ONLINE (FUNCIONA EM QUALQUER LUGAR) - descomente a linha abaixo e comente a de cima
        // const videos = ["https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"];

        let current = 0;
        let wakeLock = null;
        const video = document.getElementById('adVideo');
        const btn = document.getElementById('fullscreenBtn');
        const statusDiv = document.getElementById('statusMsg');

        // Função para tocar o vídeo atual
        function playVideo() {
            if (!videos.length) return;
            video.src = videos[current];
            video.load();
            video.play().then(() => {
                statusDiv.innerText = `▶️ Anúncio ${current+1}/${videos.length}`;
            }).catch(e => {
                statusDiv.innerText = `⚠️ Erro no vídeo ${current+1}, pulando...`;
                setTimeout(() => {
                    current = (current + 1) % videos.length;
                    playVideo();
                }, 2000);
            });
        }

        // Avança para o próximo vídeo ao terminar
        video.addEventListener('ended', () => {
            current = (current + 1) % videos.length;
            playVideo();
        });

        // Se houver erro de carregamento (arquivo não encontrado ou codec inválido)
        video.addEventListener('error', () => {
            statusDiv.innerText = "❌ Vídeo com erro, pulando...";
            setTimeout(() => {
                current = (current + 1) % videos.length;
                playVideo();
            }, 1500);
        });

        // ========== TELA CHEIA (EXATAMENTE COMO NO CAZÉ PLAYLIST) ==========
        btn.addEventListener('click', () => {
            // Tenta entrar em tela cheia usando o método padrão
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.webkitRequestFullscreen) { // Safari
                docEl.webkitRequestFullscreen();
            }
            // Esconde o botão
            btn.style.display = 'none';
            // Ativa wake lock
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').then(lock => {
                    wakeLock = lock;
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible' && wakeLock === null) {
                            navigator.wakeLock.request('screen').then(l => wakeLock = l);
                        }
                    });
                }).catch(e => console.log("Wake Lock não suportado"));
            }
            // Se o vídeo ainda não começou, inicia
            if (video.paused) playVideo();
            statusDiv.innerText = "✅ Tela cheia ativada";
        });

        // Se sair da tela cheia, mostra o botão novamente
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                btn.style.display = 'flex';
                statusDiv.innerText = "🔓 Toque no botão para reativar tela cheia";
            }
        });

        // Pré-carrega o primeiro vídeo (mas não toca até o botão)
        if (videos.length) {
            video.src = videos[0];
            video.load();
        }
    </script>
</body>
</html>
